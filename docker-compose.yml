version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ${ENV_FILE:-./backend/.env}
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=swiftpackai_db
    depends_on:
      - mongo
    volumes:
      - backend_outputs:/app/outputs
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL:-http://localhost:8001}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_outputs:
  backend_uploads:
