name: SwiftPack CI/CD

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          if find . -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
            pytest -v --tb=short
          else
            echo "No test files — skipping (deploy proceeds)"
          fi
        env:
          MONGODB_URL: mongodb://localhost:27017
          DB_NAME: swiftpackai_test
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Telegram — tests passed
        if: success() && github.ref == 'refs/heads/main'
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id":"${{ secrets.TELEGRAM_CHAT_ID }}","text":"SwiftPack tests passed — deploying..."}'

      - name: Telegram — tests failed
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id":"${{ secrets.TELEGRAM_CHAT_ID }}","text":"SwiftPack tests FAILED — deploy blocked"}' || true

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via webhook
        run: |
          curl -s -X POST \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            "http://${{ secrets.EC2_IP }}:9000/deploy/swiftpack"

      - name: Telegram — deployed
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id":"${{ secrets.TELEGRAM_CHAT_ID }}","text":"SwiftPack deployed"}' || true
