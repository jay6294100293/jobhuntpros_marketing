name: CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run tests
        run: |
          if [ -d "tests" ] && find tests -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            echo "Tests found — running pytest"
            pytest tests/ -v
          else
            echo "No test files found — skipping"
          fi

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deployment notice
        run: |
          echo "## CI complete — deploying to AWS EC2" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The EC2 auto-deploy cron runs every 5 minutes." >> $GITHUB_STEP_SUMMARY
          echo "Monitor: \`tail -f /home/ubuntu/logs/swiftpack-deploy.log\`" >> $GITHUB_STEP_SUMMARY
