name: Deploy SwiftPack AI
on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt pytest -q
        env:
          MONGODB_URL: ${{ secrets.MONGODB_URL_TEST }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET: test-secret-for-ci
          DB_NAME: swiftpack_test
      - if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=SwiftPack CI: ${{ job.status }}"

  deploy:
    needs: test
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pull deploy on Contabo
        run: |
          sleep 15
          curl -s -X POST \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            "http://${{ secrets.SERVER_IP }}:9000/deploy/swiftpack"
