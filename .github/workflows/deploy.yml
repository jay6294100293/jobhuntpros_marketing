# SwiftPack AI — CI/CD Pipeline
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   SSH_PRIVATE_KEY  — Private SSH key whose public key is in ~/.ssh/authorized_keys on the server
#   SERVER_HOST      — EC2 public IP address (e.g. 54.123.45.67)
#   SERVER_USER      — SSH username (ubuntu)
#
# Triggers on every push to main. Runs tests first; deploys only if tests pass.

name: Deploy SwiftPack AI

on:
  push:
    branches:
      - main

jobs:
  # ── Job 1: Test ───────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run pytest (skip gracefully if no tests)
        run: |
          if [ -d "tests" ] && find tests -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            echo "Tests found — running pytest"
            pytest tests/ -v
          else
            echo "No test files found in tests/ — skipping pytest"
          fi

  # ── Job 2: Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: test        # only runs if test job passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << 'ENDSSH'
            set -e
            echo "==> Pulling latest code"
            cd /home/ubuntu/swiftpack
            git pull origin main

            echo "==> Restarting containers"
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d --build

            echo "==> Cleaning up old images"
            docker system prune -f

            echo "==> Deploy finished"
          ENDSSH

      - name: Confirm deploy
        run: echo "SwiftPack AI deployed successfully"
