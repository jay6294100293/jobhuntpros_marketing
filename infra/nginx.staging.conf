upstream fastapi_staging {
    server backend:8001;
}

upstream frontend_staging {
    server frontend:80;
}

# Staging — HTTP only by default (no TLS). Add a 443 server block + certs if you
# expose staging publicly. Mirrors nginx/nginx.prod.conf routing.
server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    client_max_body_size 50m;

    # API → FastAPI backend
    location /api/ {
        proxy_pass         http://fastapi_staging;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Admin → FastAPI backend
    location /admin/ {
        proxy_pass         http://fastapi_staging;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend static app
    location / {
        proxy_pass         http://frontend_staging;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
