version: "3.9"

# Staging environment for LaunchBusiness AI — mirrors production, isolated DB + ports.
# Run from repo root:
#   cp infra/.env.staging.example infra/.env.staging   # fill in real values
#   docker compose -f infra/docker-compose.staging.yml --env-file infra/.env.staging up -d --build
#   bash infra/health_check.sh http://localhost:8101
#
# Ports are offset from prod/dev (backend 8101, frontend 3100, nginx 8080/8443, mongo 27117)
# so staging can run on the same box as another stack without colliding.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data_staging:/data/db
    expose:
      - "27017"
    ports:
      - "27117:27017"

  backend:
    build: ../backend
    restart: unless-stopped
    env_file:
      - ./.env.staging
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - DB_NAME=launchbusinessai_staging
      - ENVIRONMENT=staging
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8101}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3100}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3100}
    depends_on:
      - mongo
    ports:
      - "127.0.0.1:8101:8001"
    volumes:
      - backend_outputs_staging:/app/outputs
      - backend_uploads_staging:/app/uploads

  frontend:
    build:
      context: ../frontend
      args:
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL:-http://localhost:8101}
    restart: unless-stopped
    expose:
      - "80"
    ports:
      - "3100:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
      # TODO: mount staging TLS certs here if you terminate SSL on staging:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

volumes:
  mongo_data_staging:
  backend_outputs_staging:
  backend_uploads_staging:
