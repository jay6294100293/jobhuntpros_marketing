version: "3.9"

# Production compose — run with:
#   docker-compose -f docker-compose.prod.yml up -d --build
#
# Prerequisites on server:
#   - /root/secrets/swiftpack.env must exist with real values
#   - SSL certs at /etc/letsencrypt/live/launchbusinessai.com/
#   - Server runs as root (Contabo VPS)

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    expose:
      - "27017"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - /root/secrets/swiftpack.env
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - DB_NAME=launchbusinessai_db
      - BACKEND_URL=https://launchbusinessai.com
      - FRONTEND_URL=https://launchbusinessai.com
      - CORS_ORIGINS=https://launchbusinessai.com,https://www.launchbusinessai.com
    depends_on:
      - mongo
    expose:
      - "8001"
    volumes:
      - backend_outputs:/app/outputs
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=https://launchbusinessai.com
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

volumes:
  mongo_data:
  backend_outputs:
  backend_uploads:
