version: "3.9"

# Production compose — run with:
#   docker-compose -f docker-compose.prod.yml up -d --build
#
# Prerequisites on server:
#   - /home/ubuntu/secrets/swiftpack.env must exist with real values
#   - SSL certs at /etc/letsencrypt/live/swiftpackai.tech/
#   - Run server-setup.sh first if this is a fresh server

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Not exposed externally — backend accesses via internal network only
    expose:
      - "27017"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - /home/ubuntu/secrets/swiftpack.env
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=swiftpackai_db
      - BACKEND_URL=https://swiftpackai.tech
      - FRONTEND_URL=https://swiftpackai.tech
      - CORS_ORIGINS=https://swiftpackai.tech,https://www.swiftpackai.tech
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/tts-key.json
    depends_on:
      - mongo
    expose:
      - "8001"
    volumes:
      - backend_outputs:/app/outputs
      - backend_uploads:/app/uploads
      - /home/ubuntu/secrets/swiftpack-tts-key.json:/run/secrets/tts-key.json:ro

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=https://swiftpackai.tech
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

volumes:
  mongo_data:
  backend_outputs:
  backend_uploads:
