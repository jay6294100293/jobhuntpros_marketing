<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0A0B1E" />

        <!-- Primary SEO -->
        <title>LaunchBusiness AI — Logo. Marketing. Legal. All AI.</title>
        <meta name="description" content="Your complete business toolkit, AI-powered. Generate logos, marketing videos, scripts, posters, and legal documents in minutes. Built for founders." />
        <meta name="robots" content="index, follow" />
        <link rel="canonical" href="https://launchbusinessai.com/" />

        <!-- Open Graph (link previews on Slack, iMessage, WhatsApp, LinkedIn) -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://launchbusinessai.com/" />
        <meta property="og:title" content="LaunchBusiness AI — Logo. Marketing. Legal. All AI." />
        <meta property="og:description" content="Your complete business toolkit, AI-powered. Logo creator, AI videos, scripts, posters, and 28 legal documents. What used to cost $6,900. Now in minutes." />
        <meta property="og:image" content="https://launchbusinessai.com/logo.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:site_name" content="LaunchBusiness AI" />
        <meta property="og:locale" content="en_CA" />

        <!-- Twitter / X Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:site" content="@novajaytech" />
        <meta name="twitter:creator" content="@novajaytech" />
        <meta name="twitter:title" content="LaunchBusiness AI — Logo. Marketing. Legal. All AI." />
        <meta name="twitter:description" content="Your complete business toolkit, AI-powered. Logo, videos, scripts, and legal docs in minutes." />
        <meta name="twitter:image" content="https://launchbusinessai.com/logo.png" />

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="%PUBLIC_URL%/logo.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo.png" />

        <!-- Structured Data — SoftwareApplication -->
        <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "SoftwareApplication",
          "name": "LaunchBusiness AI",
          "url": "https://launchbusinessai.com",
          "description": "AI-powered business toolkit. Generate logos, marketing videos, scripts, posters, and legal documents in minutes.",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "offers": [
            { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "CAD" },
            { "@type": "Offer", "name": "Starter", "price": "19", "priceCurrency": "CAD" },
            { "@type": "Offer", "name": "Pro", "price": "49", "priceCurrency": "CAD" },
            { "@type": "Offer", "name": "Agency", "price": "149", "priceCurrency": "CAD" }
          ],
          "author": {
            "@type": "Organization",
            "name": "NovaJay Tech",
            "url": "https://novajaytech.com"
          }
        }
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
