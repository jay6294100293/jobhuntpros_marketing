<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0A0B1E" />

        <!-- Primary SEO -->
        <title>SwiftPack AI — Turn Any URL into a Marketing Video in Seconds</title>
        <meta name="description" content="Paste a URL. Get a TikTok, YouTube, and Instagram launch pack in seconds. SwiftPack AI generates AI voiceover, animated captions, and branded social graphics automatically." />
        <meta name="robots" content="index, follow" />
        <link rel="canonical" href="https://swiftpackai.tech/" />

        <!-- Open Graph (link previews on Slack, iMessage, WhatsApp, LinkedIn) -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://swiftpackai.tech/" />
        <meta property="og:title" content="SwiftPack AI — Turn Any URL into a Marketing Video in Seconds" />
        <meta property="og:description" content="Paste a URL. Get a TikTok, YouTube, and Instagram launch pack in seconds. AI voiceover, animated captions, branded graphics — all automatic." />
        <meta property="og:image" content="https://swiftpackai.tech/og-image.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:site_name" content="SwiftPack AI" />
        <meta property="og:locale" content="en_CA" />

        <!-- Twitter / X Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:site" content="@novajaytech" />
        <meta name="twitter:creator" content="@novajaytech" />
        <meta name="twitter:title" content="SwiftPack AI — Turn Any URL into a Marketing Video in Seconds" />
        <meta name="twitter:description" content="Paste a URL. Get a TikTok, YouTube, and Instagram launch pack in seconds." />
        <meta name="twitter:image" content="https://swiftpackai.tech/og-image.png" />

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

        <!-- Favicon -->
        <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />

        <!-- Structured Data — SoftwareApplication -->
        <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "SoftwareApplication",
          "name": "SwiftPack AI",
          "url": "https://swiftpackai.tech",
          "description": "AI-powered marketing video generator. Paste any URL and get a full TikTok, YouTube, and Instagram launch pack in seconds.",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "offers": [
            { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "CAD" },
            { "@type": "Offer", "name": "Starter", "price": "19", "priceCurrency": "CAD" },
            { "@type": "Offer", "name": "Pro", "price": "49", "priceCurrency": "CAD" },
            { "@type": "Offer", "name": "Agency", "price": "149", "priceCurrency": "CAD" }
          ],
          "author": {
            "@type": "Organization",
            "name": "NovaJay Tech",
            "url": "https://novajaytech.com"
          }
        }
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
