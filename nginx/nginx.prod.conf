upstream fastapi {
    server backend:8001;
}

upstream frontend {
    server frontend:80;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name swiftpackai.tech www.swiftpackai.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name swiftpackai.tech www.swiftpackai.tech;

    ssl_certificate     /etc/letsencrypt/live/swiftpackai.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swiftpackai.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    client_max_body_size 50m;

    # API — proxy to FastAPI backend
    location /api/ {
        proxy_pass         http://fastapi;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Admin — proxy to FastAPI backend
    location /admin/ {
        proxy_pass         http://fastapi;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend static app
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
